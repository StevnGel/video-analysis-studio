app:
  name: "video-analysis-studio"
  version: "1.0.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  reload: true

model_pool:
  gpu_instances:
    - device: "cpu"
      instance_count: 1
      model: "yolo_v8"
  instance_timeout: 300
  max_queue_size: 100

task:
  default_timeout: 3600
  max_concurrent_tasks: 10
  auto_restart: true

storage:
  video_dir: "/data/videos"
  output_dir: "/data/output"
  archive_dir: "/data/archive"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

models:
  yolo_v8:
    type: "yolo"
    framework: "ultralytics"
    model_path: "yolov8n.pt"
    conf_threshold: 0.25
    iou_threshold: 0.45
    device: "cpu"
    batch_size: 4